<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联系我 - 个人网站</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.loli.net/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- 背景光晕 -->
  <div class="bg-orbs">
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>
  </div>

  <!-- ========== 导航栏 ========== -->
  <nav class="navbar">
    <a href="index.html" class="logo">我的<span>网站</span></a>
    <button class="hamburger" aria-label="菜单">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="index.html">首页</a></li>
      <li><a href="about.html">关于我</a></li>
      <li><a href="projects.html">项目</a></li>
      <li><a href="diary.html">日记</a></li>
      <li><a href="checkin.html">打卡</a></li>
      <li><a href="contact.html">联系</a></li>
    </ul>
  </nav>

  <!-- ========== 页面标题 ========== -->
  <section class="page-header">
    <h1 class="reveal">📬 联系我</h1>
    <p class="reveal reveal-delay-1">有任何问题或合作想法，欢迎联系我</p>
  </section>

  <!-- ========== 联系表单 ========== -->
  <section class="section">
    <div class="container">

      <div class="contact-form reveal">
        <!-- 姓名 -->
        <div class="form-group">
          <label for="contactName">👤 姓名</label>
          <input type="text" id="contactName" placeholder="请输入你的姓名" maxlength="50">
        </div>

        <!-- 邮箱 -->
        <div class="form-group">
          <label for="contactEmail">📧 邮箱</label>
          <input type="email" id="contactEmail" placeholder="请输入你的邮箱地址" maxlength="100">
        </div>

        <!-- 留言 -->
        <div class="form-group">
          <label for="contactMessage">💬 留言</label>
          <textarea id="contactMessage" placeholder="你想对我说什么？" rows="5"></textarea>
        </div>

        <!-- 提交按钮 -->
        <button class="btn btn-primary" id="submitContactBtn" style="width: 100%;">
          ✉️ 发送消息
        </button>
      </div>

      <!-- ========== 社交媒体链接 ========== -->
      <h2 class="section-title reveal" style="margin-top: 50px;">🔗 社交链接</h2>
      <div class="social-links reveal reveal-delay-1">
        <!-- GitHub -->
        <a href="https://github.com" target="_blank" class="social-link">
          <span class="social-icon">🐙</span> GitHub
        </a>
        <!-- LinkedIn -->
        <a href="https://linkedin.com" target="_blank" class="social-link">
          <span class="social-icon">💼</span> LinkedIn
        </a>
        <!-- Email -->
        <a href="mailto:your-email@example.com" class="social-link">
          <span class="social-icon">📧</span> Email
        </a>
        <!-- 微信 -->
        <a href="#" class="social-link" onclick="alert('微信号：your_wechat_id');return false;">
          <span class="social-icon">💬</span> 微信
        </a>
      </div>

    </div>
  </section>

  <!-- ========== 页脚 ========== -->
  <footer class="footer">
    <ul class="footer-links">
      <li><a href="index.html">首页</a></li>
      <li><a href="about.html">关于我</a></li>
      <li><a href="projects.html">项目</a></li>
      <li><a href="diary.html">日记</a></li>
      <li><a href="checkin.html">打卡</a></li>
      <li><a href="contact.html">联系</a></li>
    </ul>
    <p>&copy; 2026 我的个人网站 | 使用 ❤️ 和 HTML/CSS/JS 构建</p>
  </footer>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- 共享 JS -->
  <script src="script.js"></script>

  <!-- ========== 联系表单专属逻辑 ========== -->
  <script>
    // ---------- 初始化 ----------
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('submitContactBtn').addEventListener('click', submitContact);
    });

    // ---------- 提交联系表单 ----------
    async function submitContact() {
      if (!requireSupabase()) return;

      const name = document.getElementById('contactName').value.trim();
      const email = document.getElementById('contactEmail').value.trim();
      const message = document.getElementById('contactMessage').value.trim();

      // 表单验证
      if (!name) {
        showError('请输入你的姓名！');
        return;
      }
      if (!email) {
        showError('请输入你的邮箱地址！');
        return;
      }
      if (!isValidEmail(email)) {
        showError('请输入有效的邮箱地址！');
        return;
      }
      if (!message) {
        showError('请输入留言内容！');
        return;
      }

      const btn = document.getElementById('submitContactBtn');
      btn.textContent = '⏳ 发送中...';
      btn.disabled = true;

      try {
        const { error } = await supabaseClient
          .from('contact_messages')
          .insert([{ name, email, message }]);

        if (error) throw error;

        showSuccess('消息发送成功！我会尽快回复你。🎉');

        // 清空表单
        document.getElementById('contactName').value = '';
        document.getElementById('contactEmail').value = '';
        document.getElementById('contactMessage').value = '';
      } catch (err) {
        console.error('发送消息失败：', err);
        showError('发送失败：' + (err.message || '未知错误。请检查 Supabase 连接和表结构。'));
      } finally {
        btn.textContent = '✉️ 发送消息';
        btn.disabled = false;
      }
    }

    // ---------- 邮箱格式验证 ----------
    function isValidEmail(email) {
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return re.test(email);
    }
  </script>
</body>
</html>
